  - week: 8
    quarter: 1stQ
    topic: 問題演習
    goal: 2次関数の全範囲を整理する
    summary:
    - 平方完成・最大最小・判別式・2次不等式が2次関数の核心
    - 定義域の有無で最大最小の解き方が変わる
    - 2次不等式は必ず放物線のグラフを描いて考える
    textbook_pages: 86-87（練習問題1-A, 1-B）
    slide_content:
      review_items:
      - 平方完成と標準形
      - 定義域あり・なしの最大最小
      - 判別式と x 軸との位置関係
      - 2次不等式の解法（3パターン）
      key_problems:
      - '1-B 問4: 放物線と内接する長方形の周の長さの最大'
      - '1-B 問5: y=x²+2mx-4m の最小値 s の関数'
    slides:
