  - week: 10
    quarter: 2ndQ
    topic: 分数関数（１）
    goal: y=a/x のグラフ（双曲線）と漸近線を理解できる
    summary:
    - y=a/x のグラフは双曲線、漸近線は x=0 と y=0
    - y=a/(x-p)+q は漸近線が x=p と y=q に移動する
    - 定義域・値域は漸近線の「除外点」から読み取る
    textbook_pages: 91-93
    slide_content:
      definitions:
      - y=a/x（a≠0）：双曲線、漸近線は x=0 と y=0
      - a>0：第1・3象限、a<0：第2・4象限
      - 平行移動：y=a/(x-p)+q（漸近線：x=p, y=q）
      examples:
      - '例題1: (1)y=1/(x-1)+2 (2)y=-2/(x+3) のグラフ・定義域・値域・漸近線'
      exercises:
      - '問3: 3つの分数関数のグラフ・定義域・値域・漸近線'
      key_points:
      - 漸近線は定義域・値域の除外点から読み取る
    slides:
      slide1:
        title: 表紙
        goal: true
        terms:
        - 分数関数
        - 双曲線
        - 漸近線
      slide2:
        title: 公式・性質
        content:
        - y=a/x：定義域・値域・漸近線・象限
        - y=a/(x-p)+q：漸近線 x=p と y=q
      slide3:
        title: 図・グラフ
        content:
