  - week: 7
    quarter: 1stQ
    topic: ２次関数と２次不等式
    goal: 2次不等式を放物線のグラフを用いて解くことができる
    summary:
    - 2次不等式は放物線と x 軸の位置関係をグラフで確認して解く
    - D>0・D=0・D<0 の3パターンで解の形が異なる
    - 「解なし」「すべての実数」が答えになるケースを見落とさない
    textbook_pages: 84-85
    slide_content:
      definitions:
      - 手順：(i) x² の係数を正に (ii) 判別式で D を調べる (iii) y の符号で解を求める
      - D>0（α<β）：ax²+bx+c>0 の解は x<α, x>β（a>0）
      - D=0（2重解α）：ax²+bx+c>0 の解は α 以外のすべての実数
      - D<0：ax²+bx+c>0 の解はすべての実数（a>0）
      examples:
      - '例題7: (1)x²+2x-1>0 (2)-x²+4x-4≧0 (3)x²+2x+3<0'
      exercises:
      - '問13: 2次不等式（4問）'
      key_points:
      - 「解なし」「すべての実数」になるケースに注意
    slides:
      slide1:
        title: 表紙
        goal: true
        terms:
        - 2次不等式
        - 解き方（グラフを利用）
      slide2:
        title: 公式・性質
        content:
        - D>0（解 α<β）：>0 の解は x<α または x>β
        - D=0：>0 の解は α 以外
        - D<0：>0 の解はすべての実数
      slide3:
        title: 図・グラフ
        content:
        - D>0・D=0・D<0 の3パターンと y>0 の範囲
      slide4:
        title: 例1→問1
        example: 例題7) p.84（3パターン各1問）
        exercise: 問13) p.85（4問）
      slide5:
        title: 追加演習
        note: 例が1セットのみのため追加演習に充てる
        exercise: 練習1-A 問8・問9) p.86
      slide6:
        title: まとめ
        summary: true
        basic:
