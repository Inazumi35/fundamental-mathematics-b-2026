course:
  name: 基礎数学B
  grade: 1
  textbook: 新 基礎数学 改訂版（大日本図書）
  evaluation:
    zenki: 前期中間35%、前期末35%、課題・レポート30%
    kouki: 前期中間17.5%、前期末17.5%、後期中間17.5%、学年末17.5%、小テスト・課題・受講態度30%
schedule:
  zenki:
  - week: 1
    quarter: 1stQ
    topic: 関数とグラフ
    goal: 関数の概念・定義域・値域を理解し、1次関数のグラフが描ける
    summary:
    - 関数とは x の値に y がただ1つ対応する関係
    - 定義域は x の範囲、値域は y の範囲
    - 1次関数 y=ax+b のグラフは傾き a・切片 b の直線
    - f(a+h) ≠ f(a)+h に注意
    textbook_pages: 72-75
    slide_content:
      definitions:
      - 関数の定義：x の値を決めると y の値がただ1つ定まるとき、y は x の関数
      - 独立変数 x、従属変数 y
      - 関数の記法：y=f(x)、f(a) は x=a における値
      - 変域（定義域・値域）
      - 1次関数：y=ax+b（a≠0）、グラフは傾き a、切片 b の直線
      - 定数関数：y=c、x 軸に平行な直線
      - x 軸に平行な直線は y=f(x) の形で表せない（x=d で表す）
      examples:
      - '例1: f(x)=5x-2 のとき f(-2)=-12, f(a)=5a-2, f(a+h)=5a+5h-2'
      - '例2・3: 定義域が限定された関数の値域'
      exercises:
      - '問1: f(x)=2x+3 のとき f(-1), f(-a), f(a+1)'
      - '問2: (1)y=3x-2（0≦x≦2）(2)y=-4x+3（-1≦x≦1）の値域'
      graph_topics:
      - 座標平面・象限（第1〜第4象限）
      - 曲線 y=f(x) のグラフ
    slides:
      slide1:
        title: 表紙
        goal: true
        terms:
        - 関数
        - 独立変数
        - 従属変数
        - 定義域
        - 値域
        - f(a)
      slide2:
        title: 公式・性質
        content:
        - 1次関数 y=ax+b
        - 定数関数 y=c
        - x=d（垂直な直線）
      slide3:
        title: 図・グラフ
        content:
        - 座標平面と象限
        - y=x+1、y=2、x=-1 のグラフ
      slide4:
        title: 例1→問1
        example: 例1) p.73
        exercise: 問1) p.73
      slide5:
        title: 例2→問2
        example: 例2) p.74
        exercise: 問2) p.74
      slide6:
        title: まとめ
        summary: true
        basic:
        - 143
        - 144
  - week: 2
    quarter: 1stQ
    topic: ２次関数のグラフ（１）
    goal: y=ax²のグラフと平行移動を理解し、標準形に変形できる
    summary:
    - y=a(x-p)²+q が標準形：軸 x=p、頂点 (p,q)
    - a>0 で下に凸、a<0 で上に凸
    - x 軸方向に p 平行移動 → x を x-p に置き換える
    - y 軸方向に q 平行移動 → 右辺に +q
    textbook_pages: 75-77
    slide_content:
      definitions:
      - 2次関数：y=ax²+bx+c（a≠0）
      - y=ax² のグラフ：y 軸を軸とし原点を頂点とする放物線
      - a>0 のとき下に凸、a<0 のとき上に凸
      - 平行移動：x 軸方向に p、y 軸方向に q → y=a(x-p)²+q
      - 標準形：y=a(x-p)²+q、軸は x=p、頂点は (p,q)
      examples:
      - y=x², y=(x-2)², y=(x-2)²+3 の関係（表と平行移動）
      - '例4: 平行移動した放物線の方程式（p.76）'
      exercises:
      - '問3: 4つの2次関数のグラフをかけ'
      - '問4: 放物線を平行移動した方程式'
      key_points:
      - x 軸方向に p 平行移動 → x を x-p に置き換える
    slides:
      slide1:
        title: 表紙
        goal: true
        terms:
        - 2次関数
        - 放物線
        - 軸
        - 頂点
        - 標準形
      slide2:
        title: 公式・性質
        content:
        - y=ax² のグラフの性質
        - 平行移動の規則 y=a(x-p)²+q
      slide3:
        title: 図・グラフ
        content:
        - y=x²、y=(x-2)²、y=(x-2)²+3 の比較
      slide4:
        title: 例1→問1
        example: 例4) p.76（軸・頂点）
        exercise: 問3) p.76（グラフをかけ）
      slide5:
        title: 例2→問2
        example: 例4) p.76（平行移動の方程式）
        exercise: 問4) p.76
      slide6:
        title: まとめ
        summary: true
        basic:
        - 145
        - 146
  - week: 3
    quarter: 1stQ
    topic: ２次関数のグラフ（２）
    goal: 平方完成により一般形を標準形に変形し、グラフが描ける
    summary:
    - 一般形 y=ax²+bx+c は平方完成で標準形に変形できる
    - 平方完成の手順：ax²+bx を a(x+b/2a)²-b²/4a に
    - 3点を通る放物線は y=ax²+bx+c として連立方程式を立てる
    textbook_pages: 77-79
    slide_content:
      definitions:
      - 平方完成：y=ax²+bx+c を y=a(x-p)²+q の形に変形する
      examples:
      - y=-2x²+8x-5 の平方完成 → y=-2(x-2)²+3（軸 x=2、頂点(2,3)）
      - '例題1: 軸 x=1、2点(0,1),(3,7)を通る放物線の方程式（p.77）'
      - '例題2: 3点を通る放物線の方程式 → y=x²-4x-1（p.78）'
      exercises:
      - '問5: 平方完成（4問）'
      - '問6: 標準形で条件を満たす放物線を求めよ（2問）'
      - '問7: 3点を通る放物線の方程式・軸・頂点'
      key_points:
      - 平方完成の手順を確実に
      - 標準形から軸・頂点・開口方向を即座に読み取る
    slides:
      slide1:
        title: 表紙
        goal: true
        terms:
        - 平方完成
        - 変形の手順
      slide2:
        title: 公式・性質
        content:
        - 平方完成の公式
        - p=-b/2a、q=c-b²/4a
        - 3ステップの手順
      slide3:
        title: 図・グラフ
        content:
        - y=-2x²+8x-5 = -2(x-2)²+3 のグラフ（軸・頂点付き）
      slide4:
        title: 例1→問1
        example: 例) p.77（平方完成の計算例）
        exercise: 問5) p.77（4問）
      slide5:
        title: 例2→問2
        example: 例題1) p.77（条件から標準形を求める）/ 例題2) p.78（3点を通る放物線）
        exercise: 問6) p.78（2問）/ 問7) p.78
      slide6:
        title: まとめ
        summary: true
        basic:
        - 147
        - 148
        - 149
  - week: 4
    quarter: 1stQ
    topic: ２次関数の最大・最小
    goal: 頂点の位置と定義域から最大値・最小値を求められる
    summary:
    - a>0 のとき頂点で最小値、a<0 のとき頂点で最大値
    - 定義域が限定されているときは端点と頂点を比較する
    - 軸が定義域の内側か外側かで場合分けが必要
    textbook_pages: 79-81
    slide_content:
      definitions:
      - a>0 のとき：x=p で最小値 q（最大値はとらない）
      - a<0 のとき：x=p で最大値 q（最小値はとらない）
      - 定義域が限定された場合：グラフの実線部分から判断
      examples:
      - '例題3: 定義域なしの最大・最小（2問）'
      - '例題4: 定義域あり（-1≦x≦2, -1≦x≦1）の最大・最小'
      exercises:
      - '問8: 最大値または最小値（2問）'
      - '問9: 定義域あり（2問）'
      - '問10: 長方形の面積を最大にする問題'
      key_points:
      - 定義域の端点・頂点を比較
      - 軸が定義域の内外どちらにあるかを確認
    slides:
      slide1:
        title: 表紙
        goal: true
        terms:
        - 最大値
        - 最小値
        - 定義域なしの場合
        - 定義域ありの場合
      slide2:
        title: 公式・性質
        content:
        - a>0：頂点で最小値
        - a<0：頂点で最大値
        - 定義域あり：端点・頂点を比較する手順
      slide3:
        title: 図・グラフ
        content:
        - 定義域なし（頂点が最小）vs 定義域あり（軸の位置で場合分け）
      slide4:
        title: 例1→問1
        example: 例題3) p.79（定義域なし）
        exercise: 問8) p.80
      slide5:
        title: 例2→問2
        example: 例題4) p.80（定義域あり）
        exercise: 問9) p.80
      slide6:
        title: まとめ
        summary: true
        basic:
        - 150
        - 151
        - 152
  - week: 5
    quarter: 1stQ
    topic: ２次関数と２次方程式（１）
    goal: 判別式を用いて放物線と x 軸の位置関係を判定できる
    summary:
    - 判別式 D=b²-4ac の符号が放物線と x 軸の関係を決める
    - D>0：2点で交わる、D=0：接する、D<0：交わらない
    - 定数を含む問題は D の条件を不等式で立てる
    textbook_pages: 81-83
    slide_content:
      definitions:
      - 判別式：D=b²-4ac
      - D>0：x 軸と2点で交わる
      - D=0：x 軸と接する（接点）
      - D<0：x 軸と共有点なし
      examples:
      - '例題5: 3つの放物線の x 軸との共有点を調べる'
      - '例題6: y=x²-4x+k の条件（交わる・接する）'
      exercises:
      - '問11: x 軸との共有点（3問）'
      - '問12: 定数 k の値・範囲（3問）'
    slides:
      slide1:
        title: 表紙
        goal: true
        terms:
        - 判別式 D=b²-4ac
        - D>0（2点で交わる）
        - D=0（接する）
        - D<0（交わらない）
      slide2:
        title: 公式・性質
        content:
        - D の符号と x 軸との位置関係対応表
        - a<0 のときは上下逆転
      slide3:
        title: 図・グラフ
        content:
        - D>0・D=0・D<0 の3パターン図
      slide4:
        title: 例1→問1
        example: 例題5) p.81（共有点を調べる）
        exercise: 問11) p.82（3問）
      slide5:
        title: 例2→問2
        example: 例題6) p.82（定数 k の条件）
        exercise: 問12) p.82（3問）
      slide6:
        title: まとめ
        summary: true
        basic:
        - 153
        - 154
  - week: 6
    quarter: 1stQ
    topic: ２次関数と２次方程式（２）
    goal: 係数条件を含む2次方程式・放物線の問題が解ける
    summary:
    - 判別式と x 軸の位置関係の3パターンを確実に使い分ける
    - 放物線が x 軸より上・下にある条件も判別式で判定
    textbook_pages: 83, 86-87
    slide_content:
      review_items:
      - 判別式と x 軸との位置関係の総整理
      exercises:
      - '練習問題1-A（p.86）: 全問'
      - '練習問題1-B（p.87）: 全問（発展）'
      key_points:
      - 判別式の符号と位置関係を確実に対応させる
    slides:
      slide1:
        title: 表紙
        goal: true
        terms:
        - 前回の復習（D と位置関係）
        - 常に y>0 の条件
        - 常に y≧0 の条件
      slide2:
        title: 公式・性質
        content:
        - a>0 かつ常に y>0 ⟺ D<0
        - 解と係数の関係（参考）
      slide3:
        title: 図・グラフ
        content:
        - k の値で位置関係が変わるイメージ図
      slide4:
        title: 例1→問1
        example: 練習1-A 問6) p.86（平行移動して原点を通る）
        exercise: 練習1-A 問7) p.86
      slide5:
        title: 例2→問2
        example: 練習1-B 問4) p.87（内接する長方形）
        exercise: 練習1-B 問5) p.87
