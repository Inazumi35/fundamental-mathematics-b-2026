  - week: 9
    quarter: 2ndQ
    topic: べき関数
    goal: べき関数の性質と奇関数・偶関数を理解しグラフが描ける
    summary:
    - べき関数 y=xⁿ は n が奇数なら奇関数、偶数なら偶関数
    - 奇関数は原点対称、偶関数は y 軸対称
    - グラフの平行移動は y=f(x-p)+q で表せる
    textbook_pages: 88-91
    slide_content:
      definitions:
      - べき関数：y=xⁿ（n は正の整数）
      - n が奇数：奇関数（f(-x)=-f(x)）、グラフは原点対称
      - n が偶数：偶関数（f(-x)=f(x)）、グラフは y 軸対称
      - 単調増加・単調減少の定義
      - グラフの平行移動：y=f(x-p)+q
      examples:
      - y=x³, y=x⁴ のグラフと表
      - '例3: y=(x-1)⁴-2 のグラフ'
      exercises:
      - '問1: 奇関数・偶関数の判定（3問）'
      - '問2: グラフをかけ（2問）'
    slides:
      slide1:
        title: 表紙
        goal: true
        terms:
        - べき関数 y=xⁿ
        - 奇関数
        - 偶関数
        - 単調増加
        - 単調減少
      slide2:
        title: 公式・性質
        content:
        - n が奇数：奇関数・原点対称
        - n が偶数：偶関数・y 軸対称
        - 平行移動 y=f(x-p)+q
      slide3:
        title: 図・グラフ
        content:
        - y=x³（奇）、y=x⁴（偶）、y=(x-1)⁴-2（平行移動）
      slide4:
        title: 例1→問1
        example: 例1・例2) p.88-89（奇偶関数の判定）
        exercise: 問1) p.89（3問）
      slide5:
        title: 例2→問2
        example: 例3) p.90（グラフをかけ）
        exercise: 問2) p.90（2問）
      slide6:
